<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>IFF Market</title><style>*{box-sizing:border-box;margin:0}body{font-family:-apple-system,sans-serif;background:#0a1929;color:#e8f4f8}.hdr{background:linear-gradient(135deg,#088395,#05BFDB);padding:18px 32px}.hdr h1{font-size:20px}.shell{max-width:1200px;margin:0 auto;padding:24px}.hero{padding:48px 36px;border-radius:18px;margin-bottom:36px;background:url('https://images.unsplash.com/photo-1565680018434-b513d5e5fd47?w=1400&q=70') center/cover;position:relative}.hero::before{content:'';position:absolute;inset:0;background:rgba(10,25,41,.6);border-radius:18px}.hero *{position:relative}h3{color:#05BFDB;font-size:15px;margin:28px 0 16px;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}.card{background:rgba(8,131,149,0.05);border:1px solid rgba(8,131,149,.18);border-radius:14px;overflow:hidden;transition:transform .2s}.card:hover{transform:translateY(-4px)}.card-img{height:160px;background-size:cover;background-position:center;position:relative}.card-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(10,25,41,.85))}.card-body{padding:18px}.price{font-size:24px;font-weight:800;color:#05BFDB;margin:8px 0}.price span{font-size:14px;font-weight:400}.label{font-size:11px;color:#6ba8b8;text-transform:uppercase;margin-bottom:4px}.meta{font-size:13px;color:#7ba8b8;margin:4px 0}.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(5,191,219,.12);color:#05BFDB}.btn{background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;width:100%;margin-top:14px}</style></head><body><div class="hdr"><h1>IFF Market - Wholesale</h1></div><div class="shell"><div class="hero"><h2 style="font-size:26px">Wholesale. Traceable. By the Case.</h2><p style="opacity:.85;margin-top:6px">Live pricing. Direct bidding. Full provenance.</p></div><h3>Market Lots</h3><div class="grid" id="market-grid"></div><h3>Consensus Prices</h3><div class="grid" id="price-grid"></div></div><script>const A="https://data.cantekhi.com";let IMG={};function specImg(s){return IMG[(s||".").toUpperCase()]||"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/c1bc664577218bfe57d2186710972a310cee75d9.jpg"}fetch("https://data.cantekhi.com/v1/images?context=marketplace").then(r=>r.json()).then(d=>{(d.images||[]).forEach(i=>{IMG[i.SPECIES_KEY]=i.IMAGE_URL});document.dispatchEvent(new Event("imagesLoaded"))});async function loadMarket(){const r=await fetch(A+"/v1/lots"),d=await r.json();document.getElementById("market-grid").innerHTML=(d.lots||[]).map(l=>'<div class="card"><div class="card-img" style="background-image:url('+specImg(l.species)+')"></div><div class="card-body"><div class="label">'+l.species+' &bull; '+(l.nation||'Indigenous')+'</div><div class="price">'+Number(l.listing_price||0).toFixed(2)+'<span>/kg</span></div><div class="meta">'+Number(l.weight_kg||0).toFixed(0)+' kg &bull; Grade '+(l.grade||'A')+'</div>'+(l.status==='listed'?'<button class="btn" onclick="alert(\'Bid placed!\')">Place Bid</button>':'<span class="pill">'+l.status+'</span>')+'</div></div>').join("")}async function loadPrices(){const r=await fetch(A+"/v1/prices"),d=await r.json();document.getElementById("price-grid").innerHTML=(d.prices||[]).map(p=>'<div class="card"><div class="card-img" style="background-image:url('+specImg(p.SPECIES_KEY)+');height:120px"></div><div class="card-body"><div class="label">'+p.SPECIES_KEY+' &bull; '+p.MARKET_TIER+'</div><div class="price" style="font-size:22px">'+Number(p.CONSENSUS_PRICE).toFixed(2)+'<span>/kg</span></div><div class="meta">'+p.FORM+'</div></div></div>').join("")}loadMarket();loadPrices()</script><div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Marketplace Guide</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about buying, selling..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:120px;height:56px;border:none;background:transparent;cursor:pointer;position:relative;padding:0"><svg viewBox="0 0 120 56" style="width:120px;height:56px;filter:drop-shadow(0 4px 12px rgba(5,191,219,0.4))"><path d="M8 28C8 16 20 8 45 8C70 8 90 12 105 20C112 24 115 28 112 32C108 40 90 48 60 48C30 48 12 42 8 28Z" fill="url(#salmonGrad)" stroke="rgba(5,191,219,0.6)" stroke-width="1"/><defs><linearGradient id="salmonGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#088395"/><stop offset="100%" stop-color="#05BFDB"/></linearGradient></defs><text x="58" y="30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Help me buy</text></svg></button></div><script>window.iffAsk=async function(){var i=document.getElementById("iff-ai-input"),m=i.value.trim();if(!m)return;i.value="";var ms=document.getElementById("iff-ai-messages");ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right">'+m+'</div><div id="iff-typing" style="margin:8px 0;color:#6ba8b8;font-style:italic">Thinking...</div>';ms.scrollTop=ms.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,persona:"marketplace_guide",caller:location.hostname})}),d=await r.json();document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8">'+d.response.replace(/\n/g,"<br>")+'</div>'}catch(e){document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;color:#ff6b6b">Error: '+e.message+'</div>'}ms.scrollTop=ms.scrollHeight}</script></body></html>
