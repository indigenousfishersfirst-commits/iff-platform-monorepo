<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IFF Harvester Dashboard</title>
  <link rel="stylesheet" href="/_shared/tokens.css"/>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1929; color: #e8f4f8; margin: 0; }
    .header { background: linear-gradient(135deg, #088395, #05BFDB); padding: 20px 32px; }
    .header h1 { margin: 0; font-size: 22px; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: rgba(8,131,149,0.08); border: 1px solid rgba(8,131,149,0.25); border-radius: 12px; padding: 20px; }
    .stat { font-size: 28px; font-weight: 700; color: #05BFDB; }
    .stat-label { font-size: 12px; text-transform: uppercase; color: #6ba8b8; letter-spacing: 1px; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(8,131,149,0.2); font-size: 14px; }
    th { color: #6ba8b8; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    .btn { background: linear-gradient(135deg, #088395, #05BFDB); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; cursor: pointer; }
    input, select { background: #071a2e; border: 1px solid rgba(8,131,149,0.3); border-radius: 8px; padding: 10px; color: #e8f4f8; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill-up { background: rgba(16,185,129,0.15); color: #10b981; }
    .pill-down { background: rgba(239,68,68,0.15); color: #ef4444; }
    .pill-flat { background: rgba(107,168,184,0.15); color: #6ba8b8; }
    .hero { background: linear-gradient(135deg, #0B5394, #1E3A8A); padding: 32px; border-radius: 16px; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <div class="header"><h1>IFF Harvester Dashboard</h1></div>
  <div class="shell">
    <div class="hero"><h2>Today's harvest. Today's price.</h2><p>Live signals, your lots, and where to send each fish.</p></div>
    <h3 style="color:#05BFDB">Live Market Signals</h3>
    <div class="grid" id="signals-grid"></div>
    <h3 style="color:#05BFDB">My Lots</h3>
    <div class="card"><table><thead><tr><th>Lot</th><th>Species</th><th>Weight</th><th>Grade</th><th>Price</th><th>Status</th></tr></thead><tbody id="lots-body"></tbody></table></div>
    <h3 style="color:#05BFDB;margin-top:32px">Create New Lot</h3>
    <div class="card">
      <div class="form-grid">
        <div><label style="color:#6ba8b8;font-size:12px">Species</label><select id="new-species"><option>SOCKEYE</option><option>CHINOOK</option><option>HALIBUT</option><option>SPOT_PRAWN</option><option>SABLEFISH</option><option>DUNGENESS</option><option>COHO</option></select></div>
        <div><label style="color:#6ba8b8;font-size:12px">Weight (kg)</label><input id="new-weight" type="number" placeholder="500"/></div>
        <div><label style="color:#6ba8b8;font-size:12px">Grade</label><select id="new-grade"><option>AA</option><option>A</option><option>B</option></select></div>
        <div><label style="color:#6ba8b8;font-size:12px">Price (CAD/kg)</label><input id="new-price" type="number" step="0.01" placeholder="18.50"/></div>
        <div><label style="color:#6ba8b8;font-size:12px">Area</label><input id="new-area" placeholder="Barkley Sound"/></div>
        <div><label style="color:#6ba8b8;font-size:12px">Harvest Date</label><input id="new-date" type="date"/></div>
      </div>
      <button class="btn" onclick="createLot()" style="margin-top:16px;width:100%">List Lot</button>
      <div id="lot-result" style="margin-top:12px"></div>
    </div>
  </div>
  <script>
    const API = "https://data.cantekhi.com";
    async function loadSignals() {
      const r = await fetch(API + "/v1/signals?kind=composite"); const d = await r.json();
      document.getElementById("signals-grid").innerHTML = (d.signals||[]).map(s => {
        const cls = s.direction==="up"?"pill-up":s.direction==="down"?"pill-down":"pill-flat";
        const arrow = s.direction==="up"?"▲":s.direction==="down"?"▼":"→";
        return `<div class="card"><div class="stat-label">${s.signal_id} (${s.species||"all"})</div><div class="stat">${s.value.toFixed(4)} ${s.unit}</div><span class="pill ${cls}">${arrow} ${s.direction}</span></div>`;
      }).join("");
    }
    async function loadLots() {
      const r = await fetch(API + "/v1/lots"); const d = await r.json();
      document.getElementById("lots-body").innerHTML = (d.lots||[]).map(l => `<tr><td><code>${l.lot_id}</code></td><td>${l.species}</td><td>${(l.weight_kg||0).toFixed(0)} kg</td><td>${l.grade||"-"}</td><td>$${(l.listing_price||0).toFixed(2)}/kg</td><td>${l.status}</td></tr>`).join("");
    }
    async function createLot() {
      const lot = { lot_id: "LOT-"+Date.now(), species: document.getElementById("new-species").value, weight_kg: parseFloat(document.getElementById("new-weight").value), grade: document.getElementById("new-grade").value, listing_price: parseFloat(document.getElementById("new-price").value), area: document.getElementById("new-area").value, harvest_date: document.getElementById("new-date").value, nation_id: "NAT_NUU" };
      if (!lot.weight_kg || !lot.listing_price) { document.getElementById("lot-result").innerHTML="<span style='color:#ff6b6b'>Fill weight and price</span>"; return; }
      const r = await fetch(API + "/v1/lots", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(lot)});
      const d = await r.json();
      document.getElementById("lot-result").innerHTML = d.success ? "<span style='color:#10b981'>Lot listed! ID: "+lot.lot_id+"</span>" : "<span style='color:#ff6b6b'>Error</span>";
      loadLots();
    }
    loadSignals(); loadLots();
    setInterval(loadSignals, 60000);
  </script>
<div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Harvester Coach</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about pricing, lots, marketing..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#088395,#05BFDB);border:none;color:white;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(5,191,219,0.4)">AI</button></div><script>window.iffAsk=async function(){var input=document.getElementById("iff-ai-input");var msg=input.value.trim();if(!msg)return;input.value="";var msgs=document.getElementById("iff-ai-messages");msgs.innerHTML+="<div style='margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right'>"+msg+"</div>";msgs.innerHTML+="<div id='iff-typing' style='margin:8px 0;color:#6ba8b8;font-style:italic'>Thinking...</div>";msgs.scrollTop=msgs.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,persona:"harvester_coach",caller:location.hostname})});var d=await r.json();document.getElementById("iff-typing").remove();msgs.innerHTML+="<div style='margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8'>"+d.response.replace(/\n/g,"<br>")+"</div>";}catch(e){document.getElementById("iff-typing").remove();msgs.innerHTML+="<div style='margin:8px 0;color:#ff6b6b'>Error: "+e.message+"</div>";}msgs.scrollTop=msgs.scrollHeight;};</script>
</body>
</html>
