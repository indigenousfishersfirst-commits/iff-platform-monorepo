<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>IFF Shop</title><style>*{box-sizing:border-box;margin:0}body{font-family:-apple-system,sans-serif;background:#0a1929;color:#e8f4f8}.hdr{background:linear-gradient(135deg,#088395,#05BFDB);padding:18px 32px}.hdr h1{font-size:20px}.shell{max-width:1200px;margin:0 auto;padding:24px}.hero{padding:48px 36px;border-radius:18px;margin-bottom:36px;background-size:cover;background-position:center;position:relative}.hero::before{content:'';position:absolute;inset:0;background:rgba(10,25,41,.6);border-radius:18px}.hero *{position:relative}h3{color:#05BFDB;font-size:15px;margin:28px 0 16px;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}.card{background:rgba(8,131,149,0.05);border:1px solid rgba(8,131,149,.18);border-radius:14px;overflow:hidden;transition:transform .2s}.card:hover{transform:translateY(-4px)}.card-img{height:200px;background-size:cover;background-position:center}.card-body{padding:18px}.price{font-size:26px;font-weight:800;color:#05BFDB;margin:8px 0}.price span{font-size:14px;font-weight:400}.meta{font-size:13px;color:#7ba8b8;margin:4px 0}.ribbon{display:inline-block;padding:4px 12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:white;border-radius:999px;font-size:11px;font-weight:700}.btn{background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;width:100%;margin-top:14px}input{background:#061525;border:1px solid rgba(8,131,149,.25);border-radius:10px;padding:11px;color:#e8f4f8;flex:1}</style></head><body>
<div class="hdr"><h1>IFF Shop</h1></div>
<div class="shell">
<div class="hero" style="background-image:url('https://pplx-res.cloudinary.com/image/upload/pplx_search_images/73b7a013c2ccb6a08d9bf12625be91cf94b1aabc.jpg')"><h2 style="font-size:26px">Wild. Indigenous-Harvested. Delivered.</h2><p style="opacity:.85;margin-top:6px">Premium Pacific seafood from named Nations. Doorstep in 36 hours.</p></div>
<h3>Fresh Catch</h3><div class="grid" id="shop-grid"><div class="card"><div class="card-body meta">Loading...</div></div></div>
<h3>CSF Subscription Boxes</h3><div class="grid" id="csf-grid"></div>
<h3>Trace Your Fish</h3><div style="display:flex;gap:10px;margin-bottom:24px"><input id="trace-id" placeholder="Lot ID from QR code"/><button class="btn" style="width:auto;padding:12px 24px" onclick="traceLot()">Trace</button></div><div id="trace-result"></div>
</div>
<script>
const API="https://data.cantekhi.com";
let IMG={};
function specImg(s){return IMG[(s||"").toUpperCase()]||"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/c1bc664577218bfe57d2186710972a310cee75d9.jpg";}
async function loadShop(){const r=await fetch(API+"/v1/lots?status=listed");const d=await r.json();document.getElementById("shop-grid").innerHTML=(d.lots||[]).map(l=>'<div class="card"><div class="card-img" style="background-image:url('+specImg(l.species)+')"></div><div class="card-body"><span class="ribbon">'+(l.area||'Wild Pacific')+'</span><div style="font-size:17px;font-weight:700;margin-top:8px">'+l.species+'</div><div class="meta">'+(l.nation||'Indigenous harvested')+' &bull; Grade '+(l.grade||'A')+'</div><div class="price">'+Number(l.listing_price||0).toFixed(2)+'<span>/kg</span></div><button class="btn" onclick="alert(\'Added to box!\')">Add to Box</button></div></div>').join("")||'<div class="meta">Coming soon</div>';}
function loadCSF(){document.getElementById("csf-grid").innerHTML='<div class="card"><div class="card-img" style="background-image:url('+specImg("SOCKEYE")+')"></div><div class="card-body"><span class="ribbon">Summer 2026</span><div style="font-size:16px;font-weight:700;margin-top:8px">Family Sockeye Box</div><div class="meta">15 kg &bull; Nuu-chah-nulth</div><div class="price">350.00 <span>CAD</span></div><div class="meta">18 of 25 sold</div><button class="btn">Subscribe</button></div></div><div class="card"><div class="card-img" style="background-image:url('+specImg("HALIBUT")+')"></div><div class="card-body"><span class="ribbon">Summer 2026</span><div style="font-size:16px;font-weight:700;margin-top:8px">Premium Halibut Share</div><div class="meta">10 kg &bull; Haida Nation</div><div class="price">650.00 <span>CAD</span></div><div class="meta">8 of 12 sold</div><button class="btn">Subscribe</button></div></div><div class="card"><div class="card-img" style="background-image:url('+specImg("SABLEFISH")+')"></div><div class="card-body"><span class="ribbon">Year-round</span><div style="font-size:16px;font-weight:700;margin-top:8px">Black Cod Connoisseur</div><div class="meta">8 kg &bull; Tsimshian</div><div class="price">900.00 <span>CAD</span></div><div class="meta">6 of 10 sold</div><button class="btn">Subscribe</button></div></div>';}
async function traceLot(){const id=document.getElementById("trace-id").value.trim();if(!id)return;const r=await fetch(API+"/public/trace/"+id);const d=await r.json();document.getElementById("trace-result").innerHTML=d.chain_valid?'<div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:16px"><strong style="color:#10b981">Verified</strong> - '+d.lot.species+', '+(d.lot.nation||'')+'. '+d.events_count+' events.</div>':'<div style="background:rgba(239,68,68,0.08);border-radius:12px;padding:16px"><strong style="color:#ef4444">Not found</strong></div>';}
async function init(){const r=await fetch(API+"/v1/images?context=shop");const d=await r.json();(d.images||[]).forEach(i=>{IMG[i.SPECIES_KEY]=i.IMAGE_URL;});loadShop();loadCSF();}
init();
</script>
<div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Shop Advisor</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about products, shares..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:120px;height:56px;border:none;background:transparent;cursor:pointer;padding:0"><svg viewBox="0 0 120 56" style="width:120px;height:56px;filter:drop-shadow(0 4px 12px rgba(5,191,219,0.4))"><path d="M8 28C8 16 20 8 45 8C70 8 90 12 105 20C112 24 115 28 112 32C108 40 90 48 60 48C30 48 12 42 8 28Z" fill="url(#sg)" stroke="rgba(5,191,219,0.6)" stroke-width="1"/><defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#088395"/><stop offset="100%" stop-color="#05BFDB"/></linearGradient></defs><text x="58" y="30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Help me buy</text></svg></button></div><script>window.iffAsk=async function(){var i=document.getElementById("iff-ai-input"),m=i.value.trim();if(!m)return;i.value="";var ms=document.getElementById("iff-ai-messages");ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right">'+m+'</div><div id="iff-typing" style="margin:8px 0;color:#6ba8b8;font-style:italic">Thinking...</div>';ms.scrollTop=ms.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,persona:"investor_analyst",caller:location.hostname})}),d=await r.json();document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8">'+d.response.replace(/\n/g,"<br>")+'</div>';}catch(e){document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;color:#ff6b6b">Error: '+e.message+'</div>';}ms.scrollTop=ms.scrollHeight;};</script>
</body></html>
