name = "iff-platform"
main = "src/index.js"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]
account_id = "95b7e4d9cf0092041f3b8cd88dfe882b"

[vars]
ENV = "production"
PLATFORM_FEE_PCT = "0.06"
NATION_SHARE_PCT = "0.10"
SOFT_CLOSE_SECS = "60"
LOG_LEVEL = "info"
SNOWFLAKE_DATABASE = "IFF_SEAFOOD"
SNOWFLAKE_WAREHOUSE = "IFF_WH"
SNOWFLAKE_ROLE = "IFF_PIPELINE_ROLE"
SNOWFLAKE_BASE_URL = "https://yshoftq-ql22196.snowflakecomputing.com"

# ---- Bindings (replace IDs after `wrangler ... create`) ----
[[d1_databases]]
binding = "DB"
database_name = "iff-app-db"
database_id = "82c629d7-c643-4008-8660-a0b1f2ce6b92"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "152afd3c93b14ff3920a871dcde77fe2"

[[r2_buckets]]
binding = "RESEARCH_BUCKET"
bucket_name = "iff-research-cache"

[[r2_buckets]]
binding = "TRACE_BUCKET"
bucket_name = "iff-traceability-docs"

[[queues.producers]]
binding = "Q_SIGNALS"
queue = "iff-signals"
[[queues.producers]]
binding = "Q_SETTLEMENTS"
queue = "iff-settlements"
[[queues.producers]]
binding = "Q_RESEARCH"
queue = "iff-research"

[[queues.consumers]]
queue = "iff-signals"
max_batch_size = 50
max_batch_timeout = 30
max_retries = 3
[[queues.consumers]]
queue = "iff-settlements"
max_batch_size = 10
max_batch_timeout = 60
[[queues.consumers]]
queue = "iff-research"
max_batch_size = 5
max_batch_timeout = 60

[[durable_objects.bindings]]
name = "AUCTION_ROOM"
class_name = "AuctionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AuctionRoom"]

# ---- Cron triggers (account-wide cap is 5 on free plan;
#      iff-price-engine already uses 2, so we use 3 here).
# Scheduler dispatches sub-jobs internally based on minute/hour/day-of-week/day-of-month.
[triggers]
crons = [
  "*/5 * * * *",        # 5-min tick: signals sync + auction watchdog
  "0 * * * *",          # hourly tick: toyosu, diesel, trends, NOAA env
  "0 7 * * *"           # daily 07:00 UTC: NOAA aggs, settlements, weekly FAO (Mon), monthly PDO/ENSO (1st)
]

# ---- Routes ----
[[routes]]
pattern = "api.cantekhi.com/*"
zone_name = "cantekhi.com"

# ---- Environments ----
[env.staging.vars]
ENV = "staging"
LOG_LEVEL = "debug"

[env.staging]
name = "iff-platform-staging"

[env.production]
name = "iff-platform"

[observability]
enabled = true
