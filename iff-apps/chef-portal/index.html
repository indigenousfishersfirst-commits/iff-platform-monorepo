<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>IFF Chef Portal</title><style>*{box-sizing:border-box;margin:0}body{font-family:-apple-system,sans-serif;background:#0a1929;color:#e8f4f8}.hdr{background:linear-gradient(135deg,#088395,#05BFDB);padding:18px 32px}.hdr h1{font-size:20px}.shell{max-width:1200px;margin:0 auto;padding:24px}.hero{padding:48px 36px;border-radius:18px;margin-bottom:36px;background:url('https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=1400&q=70') center/cover;position:relative}.hero::before{content:'';position:absolute;inset:0;background:rgba(10,25,41,.6);border-radius:18px}.hero *{position:relative}h3{color:#05BFDB;font-size:15px;margin:28px 0 16px;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}.card{background:rgba(8,131,149,0.05);border:1px solid rgba(8,131,149,.18);border-radius:14px;overflow:hidden;transition:transform .2s}.card:hover{transform:translateY(-4px)}.card-img{height:180px;background-size:cover;background-position:center;position:relative}.card-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(10,25,41,.85))}.card-body{padding:18px}.price{font-size:26px;font-weight:800;color:#05BFDB;margin:8px 0}.price span{font-size:14px;font-weight:400}.meta{font-size:13px;color:#7ba8b8;margin:4px 0}.btn{background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;width:100%;margin-top:14px}.recipe{display:flex;gap:16px;background:rgba(5,191,219,0.03);border:1px solid rgba(8,131,149,.15);border-radius:14px;padding:18px;margin-bottom:16px}.recipe img{width:140px;height:100px;object-fit:cover;border-radius:10px;flex-shrink:0}input{background:#061525;border:1px solid rgba(8,131,149,.25);border-radius:10px;padding:11px;color:#e8f4f8;flex:1}</style></head><body><div class="hdr"><h1>IFF Chef Portal</h1></div><div class="shell"><div class="hero"><h2 style="font-size:26px">Direct From the Dock to Your Kitchen</h2><p style="opacity:.85;margin-top:6px">Reserve lots. Full provenance. Indigenous culinary tradition.</p></div><h3>Available Catch</h3><div class="grid" id="catch-grid"></div><h3>Chef Recipes</h3><div id="recipes-list"></div><h3>Verify Provenance</h3><div style="display:flex;gap:10px;margin-bottom:24px"><input id="trace-id" placeholder="Enter lot ID (e.g. L001)"/><button class="btn" style="width:auto;padding:12px 24px" onclick="traceLot()">Verify</button></div><div id="trace-result"></div></div><script>const A="https://data.cantekhi.com";const IMG={SOCKEYE:"https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=800&q=80",CHINOOK:"https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=800&q=80",HALIBUT:"https://images.unsplash.com/photo-1535399831218-d5bd36d1a6b3?w=800&q=80",SPOT_PRAWN:"https://images.unsplash.com/photo-1625943553852-781c6dd46faa?w=800&q=80",DUNGENESS:"https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=800&q=80",SABLEFISH:"https://images.unsplash.com/photo-1580476262798-bddd9f4b7369?w=800&q=80",COHO:"https://images.unsplash.com/photo-1485921325833-c519f76c4927?w=800&q=80"};function specImg(s){return IMG[(s||'').toUpperCase()]||"https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800&q=80"}async function loadCatch(){const r=await fetch(A+"/v1/lots?status=listed"),d=await r.json();document.getElementById("catch-grid").innerHTML=(d.lots||[]).map(l=>'<div class="card"><div class="card-img" style="background-image:url('+specImg(l.species)+')"></div><div class="card-body"><div style="font-size:17px;font-weight:700">'+l.species+'</div><div class="meta">'+(l.area||'Pacific')+' &bull; Grade '+(l.grade||'A')+'</div><div class="price">'+Number(l.listing_price||0).toFixed(2)+'<span>/kg</span></div><div class="meta">'+Number(l.weight_kg||0).toFixed(0)+' kg</div><button class="btn" onclick="alert(\'Reserved '+l.lot_id+'!\')">Reserve</button></div></div>').join("")||'<div class="meta">No listings</div>'}async function loadRecipes(){const r=await fetch(A+"/v1/recipes"),d=await r.json();document.getElementById("recipes-list").innerHTML=(d.recipes||[]).map(rc=>'<div class="recipe"><img src="'+specImg(rc.SPECIES_KEY)+'"/><div><h4 style="color:#05BFDB;margin-bottom:4px">'+rc.TITLE+'</h4><div class="meta">'+rc.CUISINE+' &bull; '+rc.DIFFICULTY+' &bull; '+rc.PREP_TIME_MIN+' min</div><p style="font-size:13px;margin:6px 0;color:#9cb8c8">'+rc.CHEF_NOTES+'</p><div style="font-size:12px;color:#05BFDB">Pairing: '+rc.PAIRING+'</div></div></div>').join("")}async function traceLot(){const id=document.getElementById("trace-id").value.trim();if(!id)return;const r=await fetch(A+"/public/trace/"+id),d=await r.json();document.getElementById("trace-result").innerHTML=d.chain_valid?'<div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:16px"><strong style="color:#10b981">Verified</strong> - '+d.lot.species+', '+(d.lot.nation||'')+'. '+d.events_count+' events.</div>':'<div style="background:rgba(239,68,68,0.08);border-radius:12px;padding:16px"><strong style="color:#ef4444">Not found</strong></div>'}loadCatch();loadRecipes()</script><div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Seafood Sommelier</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about recipes, sourcing..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#088395,#05BFDB);border:none;color:white;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(5,191,219,0.4)">AI</button></div><script>window.iffAsk=async function(){var i=document.getElementById("iff-ai-input"),m=i.value.trim();if(!m)return;i.value="";var ms=document.getElementById("iff-ai-messages");ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right">'+m+'</div><div id="iff-typing" style="margin:8px 0;color:#6ba8b8;font-style:italic">Thinking...</div>';ms.scrollTop=ms.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,persona:"chef_sommelier",caller:location.hostname})}),d=await r.json();document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8">'+d.response.replace(/\n/g,"<br>")+'</div>'}catch(e){document.getElementById("iff-typing").remove();ms.innerHTML+='<div style="margin:8px 0;color:#ff6b6b">Error: '+e.message+'</div>'}ms.scrollTop=ms.scrollHeight}</script></body></html>
