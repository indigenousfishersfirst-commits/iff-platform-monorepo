<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>IFF Shop</title>
<style>*{box-sizing:border-box;margin:0}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a1929;color:#e8f4f8}.hdr{background:linear-gradient(135deg,#088395,#05BFDB);padding:18px 32px}.hdr h1{font-size:20px}.shell{max-width:1200px;margin:0 auto;padding:28px 24px}.hero{padding:48px 36px;border-radius:18px;margin-bottom:36px;background-size:cover;background-position:center;position:relative}.hero::before{content:'';position:absolute;inset:0;background:rgba(10,25,41,.6);border-radius:18px}.hero *{position:relative}h3{color:#05BFDB;font-size:15px;margin:28px 0 16px;text-transform:uppercase;letter-spacing:.5px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}.card{background:rgba(8,131,149,0.05);border:1px solid rgba(8,131,149,0.18);border-radius:14px;overflow:hidden;transition:transform .2s}.card:hover{transform:translateY(-4px)}.card-img{height:200px;background-size:cover;background-position:center}.card-body{padding:18px}.price{font-size:26px;font-weight:800;color:#05BFDB;margin:8px 0}.price span{font-size:14px;font-weight:400}.meta{font-size:13px;color:#7ba8b8;margin:4px 0}.ribbon{display:inline-block;padding:4px 12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:white;border-radius:999px;font-size:11px;font-weight:700}.btn{background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:10px;padding:12px 24px;font-weight:600;cursor:pointer;width:100%;margin-top:14px}input{background:#061525;border:1px solid rgba(8,131,149,.25);border-radius:10px;padding:11px;color:#e8f4f8;flex:1}</style></head><body>
<div class="hdr"><h1>IFF Shop</h1></div>
<div class="shell">
<div class="hero" style="background-image:url('https://images.unsplash.com/photo-1499125562588-29fb8a56b5d5?w=1400&q=70')"><h2 style="font-size:26px">Wild. Indigenous-Harvested. Delivered.</h2><p style="opacity:.85;margin-top:6px">Premium Pacific seafood from named Nations. Doorstep in 36 hours.</p></div>
<h3>Fresh Catch</h3><div class="grid" id="shop-grid"></div>
<h3>CSF Subscription Boxes</h3><div class="grid" id="csf-grid"></div>
<h3>Trace Your Fish</h3><div style="display:flex;gap:10px;margin-bottom:24px"><input id="trace-id" placeholder="Lot ID from QR code"/><button class="btn" style="width:auto;padding:12px 24px" onclick="traceLot()">Trace</button></div><div id="trace-result"></div>
</div>
<script>
const API="https://data.cantekhi.com";
const IMG={SOCKEYE:"https://images.unsplash.com/photo-1499125562588-29fb8a56b5d5?w=800&q=80",CHINOOK:"https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=800&q=80",HALIBUT:"https://images.unsplash.com/photo-1535399831218-d5bd36d1a6b3?w=800&q=80",SPOT_PRAWN:"https://images.unsplash.com/photo-1625943553852-781c6dd46faa?w=800&q=80",DUNGENESS:"https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=800&q=80",SABLEFISH:"https://images.unsplash.com/photo-1580476262798-bddd9f4b7369?w=800&q=80",COHO:"https://images.unsplash.com/photo-1485921325833-c519f76c4927?w=800&q=80"};
function specImg(s){return IMG[(s||'').toUpperCase()]||"https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800&q=80";}
async function loadShop(){const r=await fetch(API+"/v1/lots?status=listed");const d=await r.json();document.getElementById("shop-grid").innerHTML=(d.lots||[]).map(l=>'<div class="card"><div class="card-img" style="background-image:url('+specImg(l.species)+')"></div><div class="card-body"><span class="ribbon">'+(l.area||'Wild Pacific')+'</span><div style="font-size:17px;font-weight:700;margin-top:8px">'+l.species+'</div><div class="meta">'+(l.nation||'Indigenous harvested')+' &bull; Grade '+(l.grade||'A')+'</div><div class="price">'+Number(l.listing_price||0).toFixed(2)+'<span>/kg</span></div><button class="btn" onclick="alert(\'Added to box!\')">Add to Box</button></div></div>').join("")||'<div class="meta">Coming soon</div>';}
function loadCSF(){document.getElementById("csf-grid").innerHTML='<div class="card"><div class="card-img" style="background-image:url('+specImg('SOCKEYE')+')"></div><div class="card-body"><span class="ribbon">Summer 2026</span><div style="font-size:16px;font-weight:700;margin-top:8px">Family Sockeye Box</div><div class="meta">15 kg &bull; Nuu-chah-nulth</div><div class="price">350.00 <span>CAD</span></div><div class="meta">18 of 25 sold</div><button class="btn">Subscribe</button></div></div><div class="card"><div class="card-img" style="background-image:url('+specImg('HALIBUT')+')"></div><div class="card-body"><span class="ribbon">Summer 2026</span><div style="font-size:16px;font-weight:700;margin-top:8px">Premium Halibut Share</div><div class="meta">10 kg &bull; Haida Nation</div><div class="price">650.00 <span>CAD</span></div><div class="meta">8 of 12 sold</div><button class="btn">Subscribe</button></div></div><div class="card"><div class="card-img" style="background-image:url('+specImg('SABLEFISH')+')"></div><div class="card-body"><span class="ribbon">Year-round</span><div style="font-size:16px;font-weight:700;margin-top:8px">Black Cod Connoisseur</div><div class="meta">8 kg &bull; Tsimshian</div><div class="price">900.00 <span>CAD</span></div><div class="meta">6 of 10 sold</div><button class="btn">Subscribe</button></div></div>';}
async function traceLot(){const id=document.getElementById("trace-id").value.trim();if(!id)return;const r=await fetch(API+"/public/trace/"+id);const d=await r.json();document.getElementById("trace-result").innerHTML=d.chain_valid?'<div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:16px"><strong style="color:#10b981">Verified</strong> - '+d.lot.species+', '+(d.lot.nation||'')+'. '+d.events_count+' events.</div>':'<div style="background:rgba(239,68,68,0.08);border-radius:12px;padding:16px"><strong style="color:#ef4444">Not found</strong></div>';}
loadShop();loadCSF();
</script>
<div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Shop Advisor</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about products, shares..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#088395,#05BFDB);border:none;color:white;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(5,191,219,0.4)">AI</button></div><script>window.iffAsk=async function(){var input=document.getElementById("iff-ai-input"),msg=input.value.trim();if(!msg)return;input.value="";var msgs=document.getElementById("iff-ai-messages");msgs.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right">'+msg+'</div><div id="iff-typing" style="margin:8px 0;color:#6ba8b8;font-style:italic">Thinking...</div>';msgs.scrollTop=msgs.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,persona:"investor_analyst",caller:location.hostname})}),d=await r.json();document.getElementById("iff-typing").remove();msgs.innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8">'+d.response.replace(/\n/g,"<br>")+'</div>';}catch(e){document.getElementById("iff-typing").remove();msgs.innerHTML+='<div style="margin:8px 0;color:#ff6b6b">Error: '+e.message+'</div>';}msgs.scrollTop=msgs.scrollHeight;};</script>
</body></html>
