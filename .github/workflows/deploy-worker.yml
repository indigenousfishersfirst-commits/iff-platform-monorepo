name: Deploy Worker (iff-platform)

on:
  push:
    branches: [main]
    paths:
      - 'iff-platform/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iff-platform/package.json

      - name: Install dependencies
        working-directory: iff-platform
        run: npm install

      - name: Apply D1 migrations (remote)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: iff-platform
          command: d1 migrations apply iff-app-db --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: iff-platform
          command: deploy ${{ github.event.inputs.env == 'staging' && '--env staging' || '' }}
        # Optional integration secrets are pushed via a follow-up step so
        # missing values do not fail the deploy.

      - name: Push optional Worker secrets (if present)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:    ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_PAT:         ${{ secrets.SNOWFLAKE_PAT }}
          CLERK_JWT_KEY:         ${{ secrets.CLERK_JWT_KEY }}
          STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PERPLEXITY_API_KEY:    ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
        working-directory: iff-platform
        run: |
          for k in SNOWFLAKE_ACCOUNT SNOWFLAKE_USER SNOWFLAKE_PASSWORD SNOWFLAKE_PAT CLERK_JWT_KEY STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET PERPLEXITY_API_KEY SLACK_WEBHOOK_URL; do
            v="${!k}"
            if [ -n "$v" ]; then
              echo "Pushing secret $k"
              echo -n "$v" | npx wrangler secret put "$k" || echo "  warn: failed to push $k"
            else
              echo "Skipping $k (not set)"
            fi
          done
