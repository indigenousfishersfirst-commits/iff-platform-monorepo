<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IFF Market</title>
  <link rel="stylesheet" href="/_shared/tokens.css"/>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1929; color: #e8f4f8; margin: 0; }
    .header { background: linear-gradient(135deg, #088395, #05BFDB); padding: 20px 32px; }
    .header h1 { margin: 0; font-size: 22px; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: rgba(8,131,149,0.08); border: 1px solid rgba(8,131,149,0.25); border-radius: 12px; padding: 20px; }
    .stat { font-size: 24px; font-weight: 700; color: #05BFDB; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(8,131,149,0.2); font-size: 14px; }
    th { color: #6ba8b8; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    .btn { background: linear-gradient(135deg, #088395, #05BFDB); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    input { background: #071a2e; border: 1px solid rgba(8,131,149,0.3); border-radius: 8px; padding: 8px; color: #e8f4f8; }
    .hero { background: linear-gradient(135deg, #0B5394, #065f46); padding: 32px; border-radius: 16px; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="header"><h1>IFF Market — Wholesale</h1></div>
  <div class="shell">
    <div class="hero"><h2>Wholesale, traceable, by the case.</h2><p>Full marketplace with real-time pricing and direct bidding.</p></div>
    <h3 style="color:#05BFDB">All Lots</h3>
    <div class="card"><table><thead><tr><th>Lot</th><th>Species</th><th>Weight</th><th>Grade</th><th>Price</th><th>Nation</th><th>Status</th><th></th></tr></thead><tbody id="market-body"></tbody></table></div>
    <h3 style="color:#05BFDB;margin-top:32px">Consensus Prices</h3>
    <div class="grid" id="price-grid"></div>
    <h3 style="color:#05BFDB;margin-top:32px">Trading Post</h3>
    <div class="card"><table><thead><tr><th>Item</th><th>Type</th><th>Species</th><th>Quantity</th><th>Seeking</th><th>Nation</th></tr></thead><tbody id="trades-body"></tbody></table></div>
  </div>
  <script>
    const API = "https://data.cantekhi.com";
    async function loadMarket() {
      const r = await fetch(API + "/v1/lots"); const d = await r.json();
      document.getElementById("market-body").innerHTML = (d.lots||[]).map(l => `<tr><td><code>${l.lot_id}</code></td><td>${l.species}</td><td>${(l.weight_kg||0).toFixed(0)} kg</td><td>${l.grade||"-"}</td><td>$${(l.listing_price||0).toFixed(2)}</td><td>${l.nation||"-"}</td><td>${l.status}</td><td>${l.status==="listed"?'<button class="btn" onclick="alert(\'Bid placed on '+l.lot_id+'\')">Bid</button>':""}</td></tr>`).join("");
    }
    async function loadPrices() {
      const r = await fetch(API + "/v1/prices"); const d = await r.json();
      document.getElementById("price-grid").innerHTML = (d.prices||[]).map(p => `<div class="card"><div style="font-size:12px;color:#6ba8b8;text-transform:uppercase">${p.SPECIES_KEY} &bull; ${p.MARKET_TIER}</div><div class="stat">$${p.CONSENSUS_PRICE}/kg</div><div style="font-size:12px;color:#6ba8b8">${p.FORM} &bull; Range: $${p.CONFIDENCE_LOW}-$${p.CONFIDENCE_HIGH}</div></div>`).join("");
    }
    async function loadTrades() {
      const r = await fetch(API + "/v1/lots"); // Using lots endpoint; trades would need separate
      try { const r2 = await fetch(API + "/v1/signals"); } catch(e) {}
      document.getElementById("trades-body").innerHTML = "<tr><td colspan='6' style='color:#6ba8b8'>Trading post loading...</td></tr>";
    }
    loadMarket(); loadPrices(); loadTrades();
  </script>
<div id="iff-ai-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999"><div id="iff-ai-panel" style="display:none;width:380px;max-height:520px;background:#0a1929;border:1px solid rgba(8,131,149,0.4);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px"><div style="padding:16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;font-weight:700">Ask IFF - Marketplace Guide</div><div id="iff-ai-messages" style="height:340px;overflow-y:auto;padding:12px"></div><div style="padding:12px;border-top:1px solid rgba(8,131,149,0.3);display:flex;gap:8px"><input id="iff-ai-input" placeholder="Ask about buying, selling, grading..." style="flex:1;padding:10px;border:1px solid rgba(8,131,149,0.3);border-radius:8px;background:#071a2e;color:#e8f4f8;outline:none" onkeydown="if(event.key==='Enter')window.iffAsk()"/><button onclick="window.iffAsk()" style="padding:10px 16px;background:linear-gradient(135deg,#088395,#05BFDB);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send</button></div></div><button onclick="var p=document.getElementById('iff-ai-panel');p.style.display=p.style.display==='none'?'block':'none'" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#088395,#05BFDB);border:none;color:white;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(5,191,219,0.4)">AI</button></div><script>window.iffAsk=async function(){var input=document.getElementById("iff-ai-input");var msg=input.value.trim();if(!msg)return;input.value="";var msgs=document.getElementById("iff-ai-messages");msgs.innerHTML+="<div style='margin:8px 0;padding:8px 12px;background:rgba(8,131,149,0.15);border-radius:8px;color:#e8f4f8;text-align:right'>"+msg+"</div>";msgs.innerHTML+="<div id='iff-typing' style='margin:8px 0;color:#6ba8b8;font-style:italic'>Thinking...</div>";msgs.scrollTop=msgs.scrollHeight;try{var r=await fetch("https://data.cantekhi.com/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,persona:"marketplace_guide",caller:location.hostname})});var d=await r.json();document.getElementById("iff-typing").remove();msgs.innerHTML+="<div style='margin:8px 0;padding:8px 12px;background:rgba(5,191,219,0.08);border-radius:8px;color:#9cb8c8'>"+d.response.replace(/\n/g,"<br>")+"</div>";}catch(e){document.getElementById("iff-typing").remove();msgs.innerHTML+="<div style='margin:8px 0;color:#ff6b6b'>Error: "+e.message+"</div>";}msgs.scrollTop=msgs.scrollHeight;};</script>
</body>
</html>
